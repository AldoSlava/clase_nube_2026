<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wishlist | Star Wars Edition</title>
    <style>
        :root {
            --force-blue: #00d2ff;
            --sith-red: #ff0000;
            --space-black: #0b0b0b;
            --star-gold: #ffe81f; /* Amarillo clásico de Star Wars */
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--space-black);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                              radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            color: var(--star-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 232, 31, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--force-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.5);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--force-blue);
            box-shadow: 0 0 8px var(--force-blue);
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: var(--force-blue);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: #0099cc;
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--force-blue);
        }

        .wishlist {
            margin-top: 30px;
            list-style: none;
            padding: 0;
        }

        .wish-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--star-gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wish-info b { color: var(--star-gold); }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Star Wish</div>
        <div class="subtitle">May the gifts be with you</div>
    </header>

    <div class="container">
        <h2>Transmisión de Deseos de Cumpleaños</h2>
        
        <div class="input-group">
            <label>Nombre del Regalo (Droide, Sable, Joya...)</label>
            <input type="text" id="giftInput" placeholder="Ej: Lego del Halcón Milenario">
        </div>

        <div class="input-group">
            <label>Prioridad en la Fuerza</label>
            <select id="priorityInput">
                <option value="Baja">Baja (Padawan)</option>
                <option value="Media">Media (Caballero Jedi)</option>
                <option value="Alta">Alta (Maestro Jedi)</option>
            </select>
        </div>

        <button class="btn-add" onclick="addWish()">Enviar a la Nube</button>

        <ul class="wishlist" id="wishlist">
            <li class="wish-item">
                <div class="wish-info">
                    <b>Regalo Ejemplo:</b> Viaje a Naboo <br>
                    <small>Prioridad: Alta</small>
                </div>
                <span>✨</span>
            </li>
        </ul>
    </div>

    <footer>
        Sistema de Logística Imperial v.2026
    </footer>

    <script>
        function addWish() {
            const gift = document.getElementById('giftInput').value;
            const priority = document.getElementById('priorityInput').value;
            const list = document.getElementById('wishlist');

            if (gift === '') {
                alert('¡Debes escribir un deseo, joven Padawan!');
                return;
            }

            const li = document.createElement('li');
            li.className = 'wish-item';
            li.innerHTML = `
                <div class="wish-info">
                    <b>Regalo:</b> ${gift} <br>
                    <small>Prioridad: ${priority}</small>
                </div>
                <span>🚀</span>
            `;

            list.appendChild(li);
            document.getElementById('giftInput').value = '';
            
            // Efecto de sonido visual
            console.log('Sable de luz activado: Voom!');
        }
    </script>
</body>
</html>
