<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariana's Galactic Wishlist</title>
    <style>
        :root {
            --force-blue: #00d2ff;
            --star-gold: #ffe81f;
            --space-black: #0b0b0b;
        }

        body {
            background-color: var(--space-black);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; padding: 40px 20px; }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--star-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .mariana-name {
            color: white;
            font-size: 1.5rem;
            border: 2px solid var(--force-blue);
            padding: 5px 20px;
            display: inline-block;
            margin-top: 10px;
            border-radius: 50px;
            box-shadow: 0 0 15px var(--force-blue);
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: rgba(0,0,0,0.6);
            color: white;
            box-sizing: border-box;
        }

        .btn-add {
            width: 100%;
            padding: 15px;
            background: var(--star-gold);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .wishlist { list-style: none; padding: 0; margin-top: 30px; }

        .wish-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--force-blue);
            display: flex;
            justify-content: space-between;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Star Wish</div>
        <div class="mariana-name">Transmisión de Mariana</div>
    </header>

    <div class="container">
        <input type="text" id="giftInput" placeholder="¿Qué deseas hoy, Mariana?">
        <select id="priorityInput">
            <option value="Padawan">Prioridad: Padawan (Baja)</option>
            <option value="Jedi">Prioridad: Caballero Jedi (Media)</option>
            <option value="Maestro">Prioridad: Maestro Jedi (Alta)</option>
        </select>
        <button class="btn-add" onclick="saveWish()">Enviar a la Holocron</button>

        <ul class="wishlist" id="wishlist"></ul>
    </div>

    <script>
        // Esta función se ejecuta apenas carga la página
        window.onload = function() {
            displayWishes();
        };

        function saveWish() {
            const gift = document.getElementById('giftInput').value;
            const priority = document.getElementById('priorityInput').value;

            if (gift === '') return;

            // 1. Obtener lo que ya hay en la "memoria"
            let wishes = JSON.parse(localStorage.getItem('marianas_wishes')) || [];

            // 2. Agregar el nuevo regalo
            wishes.push({ name: gift, level: priority });

            // 3. Guardar de nuevo en la memoria
            localStorage.setItem('marianas_wishes', JSON.stringify(wishes));

            document.getElementById('giftInput').value = '';
            displayWishes();
        }

        function displayWishes() {
            const list = document.getElementById('wishlist');
            const wishes = JSON.parse(localStorage.getItem('marianas_wishes')) || [];
            
            list.innerHTML = '';

            wishes.forEach((item, index) => {
                list.innerHTML += `
                    <li class="wish-item">
                        <div>
                            <b>${item.name}</b> <br>
                            <small style="color:var(--force-blue)">Rango: ${item.level}</small>
                        </div>
                        <button class="delete-btn" onclick="deleteWish(${index})">X</button>
                    </li>
                `;
            });
        }

        function deleteWish(index) {
            let wishes = JSON.parse(localStorage.getItem('marianas_wishes'));
            wishes.splice(index, 1);
            localStorage.setItem('marianas_wishes', JSON.stringify(wishes));
            displayWishes();
        }
    </script>
</body>
</html>
